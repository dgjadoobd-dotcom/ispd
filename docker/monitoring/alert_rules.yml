groups:
  - name: radius_service
    rules:
      - alert: HighErrorRate
        expr: rate(php_app_errors_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: HighResponseLatency
        expr: histogram_quantile(0.95, rate(php_app_request_duration_seconds_bucket[5m])) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High response latency (p95 > 500ms)"
          description: "95th percentile latency is {{ $value | humanizeDuration }}."

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Target {{ $labels.instance }} has been unreachable for more than 1 minute."

      - alert: HighMemoryUsage
        expr: (php_app_memory_usage_bytes / php_app_memory_limit_bytes) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is at {{ $value | humanizePercentage }} of the limit."

      - alert: MySQLDown
        expr: mysql_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MySQL is down"
          description: "MySQL exporter reports the database is unreachable."

      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis exporter reports the cache is unreachable."
