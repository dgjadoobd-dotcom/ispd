# RADIUS Service Load Balancer Configuration
#
# Scaling instructions:
#   docker-compose up --scale app=3
#
# This will spin up 3 app instances (app1, app2, app3) that Nginx
# will distribute traffic across using least-connections balancing.

upstream radius_app {
    least_conn;

    server app1:80 max_fails=3 fail_timeout=30s;
    server app2:80 max_fails=3 fail_timeout=30s;
    server app3:80 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;

    # Gzip compression
    gzip on;
    gzip_types text/html text/css application/json;

    # Load balancer health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://radius_app;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
