# =============================================================================
# Nginx Site Configuration for Digital ISP ERP — Bare-Metal Ubuntu 24.04
# =============================================================================
#
# This is a sites-available configuration file (NOT a full nginx.conf).
# It is intended for bare-metal Ubuntu 24.04 deployments only — NOT Docker.
#
# Installation:
#   sudo cp docker/nginx/nginx-ubuntu24.conf /etc/nginx/sites-available/digital-isp
#   sudo ln -s /etc/nginx/sites-available/digital-isp /etc/nginx/sites-enabled/digital-isp
#   sudo nginx -t && sudo systemctl reload nginx
#
# Enabling HTTPS (after DNS is pointed at this server):
#   1. Run: sudo certbot --nginx -d yourdomain.com
#   2. Uncomment the HTTPS server block below
#   3. Uncomment the redirect in the HTTP block (and remove the direct-serve block)
#   4. Run: sudo nginx -t && sudo systemctl reload nginx
#
# PHP-FPM socket: /run/php/php8.3-fpm.sock (Ubuntu 24.04 default)
# Application root: /var/www/digital-isp/public
# =============================================================================


# =============================================================================
# HTTP Server Block (port 80)
# =============================================================================
# By default this block serves the application directly so the site works
# out of the box without SSL. Once you have a certificate, uncomment the
# redirect lines and comment out the direct-serve section.
# =============================================================================
server {
    listen 80;
    listen [::]:80;

    server_name _;

    # -------------------------------------------------------------------------
    # HTTPS Redirect (uncomment after obtaining a certificate via certbot)
    # -------------------------------------------------------------------------
    # return 301 https://$host$request_uri;

    # -------------------------------------------------------------------------
    # Direct-serve section — remove or comment out once HTTPS is enabled
    # -------------------------------------------------------------------------
    root /var/www/digital-isp/public;
    index index.php index.html;

    client_max_body_size 100M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' https: data:; img-src 'self' data: https:; connect-src 'self' https:; frame-ancestors 'none';" always;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Deny access to .env files
    location ~ /\.env {
        deny all;
        return 404;
    }

    # Deny access to .git directory
    location ~ /\.git {
        deny all;
        return 404;
    }

    # Deny access to composer files and storage directory
    location ~ ^/(composer\.(json|lock)|storage/) {
        deny all;
        return 404;
    }

    # Deny access to all hidden files (dot-files)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Main location — route all requests through index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM — pass .php requests to php8.3-fpm via Unix socket
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_read_timeout 300;
    }
}


